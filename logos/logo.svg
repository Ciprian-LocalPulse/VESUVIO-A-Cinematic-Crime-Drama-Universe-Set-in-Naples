<svg width="900" height="500" viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0d14"/>
      <stop offset="100%" stop-color="#1a1f2b"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#caa15a"/>
      <stop offset="100%" stop-color="#e8cf9a"/>
    </linearGradient>
  </defs>

  <rect width="900" height="500" fill="url(#sky)"/>

  <!-- Mountain silhouette -->
  <polygon points="150,340 420,120 470,160 500,120 750,340" fill="#12151c" stroke="#2a2f3b" stroke-width="2"/>
  <!-- Glowing vein -->
  <line x1="460" y1="150" x2="470" y2="300" stroke="#b5432a" stroke-width="3" opacity="0.8"/>

  <!-- City lights -->
  <g fill="#caa15a" opacity="0.7">
    <circle cx="180" cy="345" r="1.5"/>
    <circle cx="220" cy="350" r="1.5"/>
    <circle cx="260" cy="342" r="1.5"/>
    <circle cx="600" cy="348" r="1.5"/>
    <circle cx="650" cy="344" r="1.5"/>
    <circle cx="700" cy="350" r="1.5"/>
    <circle cx="340" cy="350" r="1.5"/>
    <circle cx="560" cy="346" r="1.5"/>
  </g>

  <!-- Title -->
  <text x="450" y="420" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="72" letter-spacing="14" fill="#f2ede4" font-weight="bold">VESUVIO</text>
  <text x="450" y="455" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="20" letter-spacing="10" fill="url(#gold)">BLOOD OF NAPLES</text>
</svg>
