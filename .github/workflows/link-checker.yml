name: Link Checker

on:
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - ".github/workflows/link-checker.yml"

  pull_request:
    paths:
      - "**/*.md"
      - ".github/workflows/link-checker.yml"

  schedule:
    - cron: "0 6 * * 1"

  workflow_dispatch:

jobs:
  lychee:
    name: Link Checker
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run Lychee Link Checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --exclude "mailto:.*"
            "**/*.md"
          fail: true
