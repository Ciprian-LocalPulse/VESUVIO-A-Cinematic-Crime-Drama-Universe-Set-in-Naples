name: Spellcheck

on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - ".cspell.json"
      - ".github/workflows/spellcheck.yml"
  pull_request:
    paths:
      - "**/*.md"
      - ".cspell.json"
      - ".github/workflows/spellcheck.yml"
  workflow_dispatch:

jobs:
  cspell:
    name: cspell
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run cspell
        uses: streetsidesoftware/cspell-action@v6
        with:
          config: ".cspell.json"
          files: |
            **/*.md
          strict: true
